<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350"><defs></defs><rect width="1080" height="1350" fill="#ffffff"/><rect x="0" y="0" width="1080" height="200" rx="0" fill="#7c3aed"/><rect x="0" y="192" width="1080" height="8" rx="0" fill="#0d9488"/><text x="540" y="48" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff" text-anchor="middle" data-role="value"><tspan x="540" dy="0">MCP Security Preflight</tspan><tspan x="540" dy="50">(7 Questions)</tspan></text><text x="540" y="158" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#ede9fe" text-anchor="middle" data-role="body">Ask these before enabling any server.</text><rect x="30" y="210" width="1020" height="118" rx="8" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/><rect x="46" y="251" width="36" height="36" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/><text x="100" y="255" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#1e293b" text-anchor="start" data-role="body"><tspan x="100" dy="0">Is this server actively maintained? (last commit &lt;</tspan><tspan x="100" dy="30">90 days)</tspan></text><rect x="958" y="251" width="80" height="36" rx="18" fill="#16a34a"/><text x="998" y="269" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" data-role="caption" dominant-baseline="central">GOOD</text><rect x="30" y="334" width="1020" height="118" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><rect x="46" y="375" width="36" height="36" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/><text x="100" y="379" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#1e293b" text-anchor="start" data-role="body"><tspan x="100" dy="0">Do I know which trust boundary it opens? (local vs</tspan><tspan x="100" dy="30">remote)</tspan></text><rect x="958" y="375" width="80" height="36" rx="18" fill="#16a34a"/><text x="998" y="393" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" data-role="caption" dominant-baseline="central">GOOD</text><rect x="30" y="458" width="1020" height="118" rx="8" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/><rect x="46" y="499" width="36" height="36" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/><text x="100" y="517" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#1e293b" text-anchor="start" data-role="body"><tspan x="100" dy="0">Have I read the security/README section?</tspan></text><rect x="934" y="499" width="104" height="36" rx="18" fill="#d97706"/><text x="986" y="517" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" data-role="caption" dominant-baseline="central">MEDIUM</text><rect x="30" y="582" width="1020" height="118" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><rect x="46" y="623" width="36" height="36" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/><text x="100" y="641" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#1e293b" text-anchor="start" data-role="body"><tspan x="100" dy="0">Are roots/scopes as narrow as possible?</tspan></text><rect x="958" y="623" width="80" height="36" rx="18" fill="#dc2626"/><text x="998" y="641" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" data-role="caption" dominant-baseline="central">HIGH</text><rect x="30" y="706" width="1020" height="118" rx="8" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/><rect x="46" y="747" width="36" height="36" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/><text x="100" y="765" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#1e293b" text-anchor="start" data-role="body"><tspan x="100" dy="0">Does my client require approval for write tools?</tspan></text><rect x="958" y="747" width="80" height="36" rx="18" fill="#dc2626"/><text x="998" y="765" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" data-role="caption" dominant-baseline="central">HIGH</text><rect x="30" y="830" width="1020" height="118" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/><rect x="46" y="871" width="36" height="36" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/><text x="100" y="875" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#1e293b" text-anchor="start" data-role="body"><tspan x="100" dy="0">Do I understand ToolAnnotations for destructive</tspan><tspan x="100" dy="30">tools?</tspan></text><rect x="958" y="871" width="80" height="36" rx="18" fill="#16a34a"/><text x="998" y="889" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" data-role="caption" dominant-baseline="central">GOOD</text><rect x="30" y="954" width="1020" height="118" rx="8" fill="#f8fafc" stroke="#e5e7eb" stroke-width="1"/><rect x="46" y="995" width="36" height="36" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/><text x="100" y="1013" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#1e293b" text-anchor="start" data-role="body"><tspan x="100" dy="0">Does this server solve a real daily loop?</tspan></text><rect x="958" y="995" width="80" height="36" rx="18" fill="#16a34a"/><text x="998" y="1013" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle" data-role="caption" dominant-baseline="central">GOOD</text><rect x="30" y="1086" width="1020" height="72" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="540" y="1122" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#1e293b" text-anchor="middle" data-role="body" dominant-baseline="central">All 7 checked? Safe to enable. Missing any? Stop and verify.</text><text x="540" y="1192" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#94a3b8" text-anchor="middle" data-role="caption">modelcontextprotocol.io/specification/2025-03-26/server/tools — 2026-06-28</text></svg>